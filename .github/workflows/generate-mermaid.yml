name: Generate Mermaid Diagrams
on:
  push:
    paths:
      - 'diagrams/*.mmd'
  workflow_dispatch:
    inputs:
      reason:
        description: 'Test Run'
        required: false
        default: 'Manual test'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write 
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Ensures we have history to push back

      - name: Ensure diagrams directory exists
        run: mkdir -p diagrams

      - name: Render Mermaid Diagram
        uses: mermaid-js/mermaid-cli@master
        with:
          # Use relative paths here; the action handles the workspace mapping
          input: 'diagrams/architecture.mmd'
          output: 'diagrams/architecture.svg'

      - name: Debug Output
        run: |
          echo "Checking for generated files:"
          ls -la diagrams/

      - name: Commit and Push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # Check if the file exists before adding to avoid the fatal error
          if [ -f "diagrams/architecture.svg" ]; then
            git add diagrams/architecture.svg
            git commit -m "chore: update architecture diagram" || echo "No changes to commit"
            git push
          else
            echo "Error: architecture.svg was not found!"
            exit 1
          fi
