name: Generate Mermaid Diagrams
on:
  push:
    paths:
      - 'diagrams/*.mmd' # Only run when diagrams were updated
  workflow_dispatch:
    inputs:
      reason:
        description: 'Test Run'
        required: false
        default: 'Manual test'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write 
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Render Mermaid Diagram
        uses: mermaid-js/mermaid-cli@master
        with:
          input: diagrams/architecture.mmd
          output: diagrams/architecture.svg

      - name: Commit and Push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add diagrams/architecture.svg
          git commit -m "chore: update architecture diagram" || exit 0
          git push
